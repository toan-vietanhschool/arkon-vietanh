
# Backend image built once, reused by api + workers
x-backend: &backend
  build:
    context: .
    dockerfile: Dockerfile
  image: arkon-backend:latest
  env_file: [.env.docker]
  restart: always
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    minio:
      condition: service_healthy
  volumes:
    - ./temp_uploads:/app/temp_uploads

services:
  # ── Infrastructure ────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    container_name: arkon_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-arkon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-arkon_secret}
      POSTGRES_DB: ${POSTGRES_DB:-arkon}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-arkon} -d ${POSTGRES_DB:-arkon}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: arkon_redis
    restart: always
    command: redis-server --save 60 1 --loglevel warning --requirepass ${REDIS_PASSWORD:-arkon_secret}
    volumes:
      - redis_data:/data
    # ports:
    #   - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-arkon_secret} ping | grep PONG || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: arkon_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    volumes:
      - minio_data:/data
    ports:
      - "9002:9000"
      - "9003:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Application ───────────────────────────────────────────────

  api:
    <<: *backend
    container_name: arkon_api
    ports:
      - "5055:5055"
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 5055
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5055/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    <<: *backend
    container_name: arkon_worker
    command: python -m arq app.worker.WorkerSettings
    depends_on:
      api:
        condition: service_healthy

  worker_skills:
    <<: *backend
    container_name: arkon_worker_skills
    command: python -m arq app.worker.SkillWorkerSettings
    depends_on:
      api:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5055}
    image: arkon-frontend:latest
    container_name: arkon_frontend
    restart: always
    ports:
      - "3119:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:5055}
      - INTERNAL_API_URL=http://api:5055
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
